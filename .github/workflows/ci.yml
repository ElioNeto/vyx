name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  go-test:
    name: Go — Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Build
        run: |
          cd core && go build ./...
          cd ../cmd/vyx && go build ./...
          cd ../../examples/hello-world/workers/go && go build ./...

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11
          working-directory: core

      - name: Test with coverage
        run: |
          cd core && go test -v ./... -coverprofile=coverage.txt -covermode=atomic
          cd ../scanner && go test -v ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: core/coverage.txt
          flags: go
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: core/coverage.txt
          retention-days: 1

  python-sdk-test:
    name: Python SDK — Lint, Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: packages/python
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov msgpack pydantic ruff
          pip install -e .

      - name: Lint (Ruff)
        working-directory: packages/python
        run: ruff check vyx/

      - name: Test with coverage
        working-directory: packages/python
        run: |
          python -m pytest tests/ -v \
            --cov=vyx \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: packages/python/coverage.xml
          flags: python
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-coverage
          path: packages/python/coverage.xml
          retention-days: 1

  scanner-test:
    name: Go Scanner — Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Test scanner
        run: cd scanner && go test -v ./...

  node-sdk-test:
    name: Node.js SDK — Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: packages/worker
        run: npm install

      - name: Test
        working-directory: packages/worker
        run: npm test

      - name: Audit npm dependencies
        working-directory: packages/worker
        run: npm audit --audit-level=high

  security-go:
    name: Security — Go (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: govulncheck
        run: |
          cd core
          GOWORK=off go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        env:
          GOTOOLCHAIN: auto

  security-python:
    name: Security — Python (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit
        working-directory: packages/python
        run: pip-audit --requirement <(pip install -e . --dry-run 2>&1 | grep 'Would install' | sed 's/Would install //' | tr ' ' '\n' | sed 's/-[0-9].*//' || true) || pip-audit .

  secrets-scan:
    name: Security — Secrets (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/golang \
            --config p/python \
            --config p/secrets \
            --error \
            --sarif-output=semgrep.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: success() && github.ref == 'refs/heads/main'
        with:
          sarif_file: semgrep.sarif

  sonarcloud:
    name: Quality — SonarCloud
    runs-on: ubuntu-latest
    needs: [go-test, python-sdk-test]
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Go coverage
        uses: actions/download-artifact@v8
        with:
          name: go-coverage
          path: core/
        continue-on-error: true

      - name: Download Python coverage
        uses: actions/download-artifact@v8
        with:
          name: python-coverage
          path: packages/python/
        continue-on-error: true

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Wait for SonarCloud analysis to be processed
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail
          PROJECT_KEY="ElioNeto_vyx"
          MAX_RETRIES=30
          i=0
          echo "Waiting for SonarCloud analysis to finish..."
          # base64-encoded python: reads sonar CE task status from stdin JSON
          PARSE_STATUS=''
          while true; do
            RESPONSE=$(curl -sf \
              -H "Authorization: Bearer ${SONAR_TOKEN}" \
              "https://sonarcloud.io/api/ce/component?component=${PROJECT_KEY}" || echo '{}')
            STATUS=$(echo "${RESPONSE}" | python3 <(echo "${PARSE_STATUS}" | base64 -d) 2>/dev/null || echo "UNKNOWN")
            echo "  status: ${STATUS}"
            case "${STATUS}" in
              SUCCESS|FAILED|CANCELED|NONE) break ;;
            esac
            i=$((i+1))
            if [ $i -ge $MAX_RETRIES ]; then
              echo "Timed out. Continuing anyway."
              break
            fi
            sleep 10
          done

      - name: Extract SonarCloud report
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo '' | base64 -d > /tmp/extract_sonar.py
          python3 /tmp/extract_sonar.py

      - name: Upload SonarCloud report
        uses: actions/upload-artifact@v4
        with:
          name: sonar-report
          path: sonar_report.txt
          retention-days: 7
