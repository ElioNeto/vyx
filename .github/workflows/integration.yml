name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    name: Go Integration Tests (in-process)
    runs-on: ubuntu-latest
    container: golang:1.25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run in-process integration tests
        run: cd core && go test -v -count=1 -timeout=60s ./integration/...

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: core/integration/
          retention-days: 7

  e2e:
    name: End-to-End Tests (real core + workers)
    runs-on: ubuntu-latest
    container: golang:1.25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd packages/python && pip install -e .
          cd ../worker && npm install

      - name: Run e2e tests
        run: bash scripts/e2e-test.sh

      - name: Upload e2e logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs
          path: /tmp/vyx-e2e-*/logs/
          retention-days: 7
