name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    name: Go Integration Tests (in-process)
    runs-on: ubuntu-latest
    container: golang:1.25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run in-process integration tests
        run: cd core && go test -v -count=1 -timeout=60s ./integration/...

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: core/integration/
          retention-days: 7
