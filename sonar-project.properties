sonar.projectKey=ElioNeto_vyx
sonar.organization=elioneto
sonar.projectName=vyx
sonar.projectVersion=0.1.0

# Sources
sonar.sources=core,packages/python/vyx,packages/worker/src
sonar.tests=core,packages/python/tests,packages/worker

# Exclusions
sonar.exclusions=**/*_test.go,**/tests/**,**/testdata/**,**/*.pb.go,**/vendor/**,**/node_modules/**
sonar.test.inclusions=**/*_test.go,**/tests/test_*.py,**/*.test.ts,**/*.spec.ts

# Coverage reports
sonar.go.coverage.reportPaths=core/coverage.txt
sonar.python.coverage.reportPaths=packages/python/coverage.xml

# Language settings
sonar.python.version=3.12
